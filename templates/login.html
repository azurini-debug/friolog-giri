{% extends "base.html" %}
{% block navbar %}{% endblock %}
{% block content %}
<div style="max-width:380px;margin:4rem auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-weight:700;font-size:2rem;color:var(--navy);letter-spacing:.3px;line-height:1;">
        Friolog<span style="color:var(--blue);">.it</span>
      </div>
      <div style="font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-top:.4rem;">
        logistica del freddo
      </div>
      <p style="color:var(--gray-600);font-size:.9rem;margin-top:1rem;">Accesso riservato all'ufficio logistica</p>
    </div>
    <form method="POST">
      <div style="margin-bottom:1rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Accedi</button>
    </form>
  </div>
</div>
{% endblock %}
