{% extends "base.html" %}
{% block navbar %}{% endblock %}
{% block content %}
<div style="max-width:380px;margin:4rem auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <img src="{{ url_for('static', filename='logo-friolog.jpg') }}" alt="Friolog.it — logistica del freddo" style="max-width:220px;width:100%;height:auto;">
      <p style="color:var(--gray-600);font-size:.9rem;margin-top:1rem;">Accesso riservato all'ufficio logistica</p>
    </div>
    <form method="POST">
      <div style="margin-bottom:1rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Accedi</button>
    </form>
  </div>
</div>
{% endblock %}
