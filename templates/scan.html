<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Identifica cartone — Friolog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:#2ba0dc; --navy:#1e326e; --navy-dk:#16264f; --sky-tint:#e3f3fb;
      --green:#057a55; --green-bg:#d1fae5; --amber:#92400e; --amber-bg:#fef3c7;
      --red:#c81e1e; --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
      --gray-400:#9ca3af; --gray-600:#4b5563; --gray-800:#1f2937; --radius:10px;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
           background:var(--gray-100); color:var(--gray-800); padding-bottom:2rem; }
    header { background:#fff; padding:.7rem 1rem; position:sticky; top:0; z-index:100;
             border-bottom:1px solid var(--gray-200); box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .brand-mark { font-weight:700; font-size:1.15rem; color:var(--navy); letter-spacing:.2px; }
    .brand-mark .dot { color:var(--blue); }
    header .sub { font-size:.9rem; font-weight:700; margin-top:.3rem; color:var(--gray-800); }
    .wrap { padding:1rem; max-width:560px; margin:0 auto; }
    .card { background:#fff; border-radius:var(--radius); box-shadow:0 1px 3px rgba(0,0,0,.1);
            padding:1rem; margin-bottom:1rem; }
    .hint { font-size:.85rem; color:var(--gray-600); line-height:1.5; }
    .pick { display:block; text-align:center; background:var(--sky-tint); color:var(--navy-dk);
            border:1.5px dashed var(--blue); border-radius:var(--radius); padding:1.1rem;
            font-weight:600; cursor:pointer; }
    #thumbs { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.75rem; }
    #thumbs .t { position:relative; }
    #thumbs img { width:72px; height:72px; object-fit:cover; border-radius:8px; border:1px solid var(--gray-200); }
    #thumbs .x { position:absolute; top:-6px; right:-6px; background:var(--red); color:#fff;
                 border:none; border-radius:50%; width:20px; height:20px; font-size:.8rem; cursor:pointer; line-height:1; }
    .btn { display:block; width:100%; padding:.85rem; border:none; border-radius:var(--radius);
           font-size:1rem; font-weight:700; cursor:pointer; }
    .btn-go { background:var(--navy); color:#fff; }
    .btn-go:disabled { opacity:.45; cursor:not-allowed; }
    .btn-reset { background:transparent; border:1.5px solid var(--blue); color:var(--blue); margin-top:.6rem; }
    .read-row { display:flex; justify-content:space-between; gap:.5rem; padding:.35rem 0;
                border-bottom:1px solid var(--gray-100); font-size:.9rem; }
    .read-row:last-child { border-bottom:none; }
    .read-row .k { color:var(--gray-600); }
    .read-row .v { font-weight:600; text-align:right; word-break:break-word; }
    .codice { font-size:2rem; font-weight:800; letter-spacing:1px; color:var(--navy); }
    .conf { display:inline-block; padding:.25rem .7rem; border-radius:999px; font-weight:700; font-size:.9rem; }
    .conf.ok { background:var(--green-bg); color:var(--green); }
    .conf.no { background:var(--amber-bg); color:var(--amber); }
    .tag { display:inline-block; background:var(--sky-tint); color:var(--navy-dk);
           border-radius:999px; padding:.15rem .55rem; font-size:.72rem; font-weight:600; margin:.15rem .15rem 0 0; }
    .alt { border-top:1px dashed var(--gray-200); margin-top:.75rem; padding-top:.6rem; }
    .alt .codice { font-size:1.15rem; }
    .spinner { text-align:center; color:var(--gray-600); font-size:.9rem; padding:1rem; }
    .err { background:#fee2e2; color:#7f1d1d; border-radius:var(--radius); padding:.75rem; font-size:.9rem; }
    .note { font-size:.82rem; color:var(--amber); margin-top:.5rem; }
  </style>
</head>
<body>
<header>
  <img src="{{ url_for('static', filename='logo-friolog.jpg') }}" alt="Friolog.it" style="height:30px;display:block;">
  <div class="sub">📦 Identifica cartone</div>
</header>

<div class="wrap">
  <div class="card">
    <p class="hint" style="margin-bottom:.75rem;">
      Scatta o scegli fino a <strong>4 foto</strong> dell'etichetta (anche di facciate diverse
      dello stesso cartone). Poi premi <strong>Identifica</strong>.
    </p>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
      <label class="pick" for="fotocam" style="flex:1;min-width:130px;">📷 Scatta foto</label>
      <label class="pick" for="fotogal" style="flex:1;min-width:130px;">🖼️ Dalla galleria</label>
    </div>
    <input type="file" id="fotocam" accept="image/*" capture="environment" hidden>
    <input type="file" id="fotogal" accept="image/*" multiple hidden>
    <div id="thumbs"></div>
    <div id="count" class="hint" style="margin-top:.5rem;"></div>
  </div>

  <button class="btn btn-go" id="btnGo" disabled onclick="identifica()">Identifica</button>

  <div id="risultato"></div>
</div>

<script>
let fotos = [];
const thumbs = document.getElementById('thumbs');
const count = document.getElementById('count');
const btnGo = document.getElementById('btnGo');

function aggiungi(fileList) {
  for (const f of fileList) {
    if (fotos.length >= 4) break;
    fotos.push(f);
  }
  render();
}
document.getElementById('fotocam').addEventListener('change', e => { aggiungi(e.target.files); e.target.value = ''; });
document.getElementById('fotogal').addEventListener('change', e => { aggiungi(e.target.files); e.target.value = ''; });

function render() {
  thumbs.innerHTML = '';
  fotos.forEach((f, i) => {
    const d = document.createElement('div');
    d.className = 't';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    const x = document.createElement('button');
    x.className = 'x'; x.textContent = '×';
    x.onclick = () => { fotos.splice(i, 1); render(); };
    d.appendChild(img); d.appendChild(x);
    thumbs.appendChild(d);
  });
  count.textContent = fotos.length ? `${fotos.length}/4 foto` : '';
  btnGo.disabled = fotos.length === 0;
}

async function identifica() {
  btnGo.disabled = true;
  const r = document.getElementById('risultato');
  r.innerHTML = '<div class="card spinner">⏳ Lettura etichetta e ricerca in corso…</div>';

  const fd = new FormData();
  fotos.forEach(f => fd.append('foto', f));

  try {
    const resp = await fetch('/api/scan/{{ token }}/identifica', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!data.ok) { r.innerHTML = `<div class="card"><div class="err">${data.msg || 'Errore.'}</div></div>`; btnGo.disabled = false; return; }
    mostra(data);
  } catch (err) {
    r.innerHTML = '<div class="card"><div class="err">Errore di connessione. Riprova.</div></div>';
  }
  btnGo.disabled = false;
}

function riga(k, v) {
  return v ? `<div class="read-row"><span class="k">${k}</span><span class="v">${escq(v)}</span></div>` : '';
}
function escq(s){ return (s+'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function mostra(d) {
  const L = d.letto || {};
  const cand = d.candidati || [];
  const r = document.getElementById('risultato');

  let html = '<div class="card"><h3 style="font-size:.95rem;margin-bottom:.5rem;color:var(--gray-600);">Letto dall\'etichetta</h3>';
  html += riga('Lotto', L.lotto) + riga('Scadenza', L.scadenza) + riga('Fornitore', L.fornitore) + riga('Descrizione', L.descrizione);
  if (L.incertezze) html += `<div class="note">⚠️ ${escq(L.incertezze)}</div>`;
  html += '</div>';

  if (!cand.length) {
    html += '<div class="card"><div class="err">Nessuna corrispondenza trovata in archivio. Verifica manualmente.</div></div>';
  } else {
    const top = cand[0];
    const ok = d.confidenza >= d.soglia;
    html += '<div class="card">';
    html += `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;">
               <span class="codice">${escq(top.codice)}</span>
               <span class="conf ${ok?'ok':'no'}">${d.confidenza}% ${ok?'affidabile':'da verificare'}</span></div>`;
    html += `<div style="font-size:.9rem;color:var(--gray-600);margin-top:.35rem;">${escq(top.descrizione)}</div>`;
    html += '<div style="margin-top:.4rem;">' + (top.motivi||[]).map(m=>`<span class="tag">${escq(m)} ✓</span>`).join('') + '</div>';
    if (!ok) html += '<div class="note">Confidenza sotto soglia: controlla la corrispondenza prima di caricare.</div>';

    cand.slice(1).forEach(c => {
      html += `<div class="alt"><span class="codice">${escq(c.codice)}</span>
               <span style="font-size:.8rem;color:var(--gray-400);"> alternativa</span>
               <div style="font-size:.85rem;color:var(--gray-600);">${escq(c.descrizione)}</div>
               <div>${(c.motivi||[]).map(m=>`<span class="tag">${escq(m)}</span>`).join('')}</div></div>`;
    });
    html += '</div>';
  }

  html += '<button class="btn btn-reset" onclick="reset()">↺ Nuovo cartone</button>';
  r.innerHTML = html;
}

function reset() {
  fotos = [];
  render();
  document.getElementById('risultato').innerHTML = '';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
